<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUR CODE GUIDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fafafa;
            color: #18181b;
            scroll-behavior: smooth;
        }
        .code-font { font-family: 'Fira Code', monospace; }
        .serif-font { font-family: 'Playfair Display', serif; }
        
        /* Smooth transitions for the monk-like feel */
        .explanation-card {
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .section-focus {
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        /* Minimal scrollbar */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 10px; }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
</head>
<body class="min-h-screen bg-zinc-50 flex flex-col lg:flex-row">
    <!-- Left: Content Area -->
    <main class="flex-1 px-6 py-12 lg:px-24 lg:py-24 max-w-5xl mx-auto lg:mx-0 overflow-x-hidden">
        <nav class="mb-20 flex items-center space-x-10 border-b border-zinc-200 pb-4">
            <button id="btn-python" class="nav-link text-xs font-bold uppercase tracking-widest transition-colors text-zinc-900 border-b-2 border-zinc-900 pb-4 -mb-[18px]">
                Python
            </button>
            <button id="btn-c" class="nav-link text-xs font-bold uppercase tracking-widest transition-colors text-zinc-400 hover:text-zinc-600 pb-4 -mb-[18px]">
                System C
            </button>
        </nav>

        <header id="app-header" class="mb-24">
            <!-- Dynamic Title and Subtitle -->
        </header>

        <div id="content-area" class="space-y-40 pb-96">
            <!-- Code blocks and text sections will be injected here -->
        </div>
    </main>

    <!-- Right: The Guide -->
    <aside class="lg:w-[480px] lg:h-screen lg:sticky lg:top-0 bg-white lg:border-l border-zinc-100 px-12 py-16 lg:py-0 flex flex-col justify-center shadow-2xl lg:shadow-none">
        <div id="sidebar-container" class="relative min-h-[400px] flex flex-col justify-center">
            
            <!-- Insight Box -->
            <div id="explanation-box" class="explanation-card opacity-0 translate-y-8">
                <div class="mb-6">
                    <span class="inline-block px-4 py-1.5 bg-zinc-900 text-white text-[9px] font-black uppercase tracking-[0.3em] rounded-full">
                        Contextual Insight
                    </span>
                </div>
                <p id="explanation-text" class="serif-font italic text-3xl text-zinc-800 leading-tight">
                    <!-- Explanation content -->
                </p>
            </div>

            <!-- Placeholder when nothing is in focus -->
            <div id="sidebar-placeholder" class="absolute inset-0 flex flex-col justify-center items-center text-center opacity-10 transition-opacity duration-1000">
                <p class="serif-font italic text-lg text-zinc-900 mb-2">Codes are Easy-Peasy.</p>
                <p class="text-zinc-500 text-[10px] tracking-widest uppercase">Scroll to uncover the logic</p>
            </div>
        </div>
        
        <div class="mt-auto pt-12 border-t border-zinc-50 hidden lg:block pb-12">
            <p class="text-[9px] text-zinc-400 uppercase tracking-[0.25em] leading-loose">
                Your Code Guide &mdash; A Tool for better Code understanding.<br/>
                Authored by MonikaGaha.
            </p>
        </div>
    </aside>

    <script type="module" src="index.js"></script>
</body>
</html>
